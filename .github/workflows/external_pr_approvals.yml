name: External PR Approvals

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed, edited]

permissions:
  pull-requests: read

jobs:
  check-approvals:
    name: "External PR Approvals"
    runs-on: ubuntu-latest
    steps:
      - name: Check required approvals
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            // A user is "internal" if they have write/maintain/admin access to the repo
            // (including access granted via org team membership — this is the reason we
            // use this endpoint instead of author_association, which misses private
            // org members).
            const internalPermissions = new Set(['admin', 'maintain', 'write']);
            const permissionCache = new Map();
            async function isInternal(login) {
              if (permissionCache.has(login)) return permissionCache.get(login);
              let permission = 'none';
              try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner, repo, username: login,
                });
                permission = data.permission;
              } catch (e) {
                if (e.status !== 404) throw e;
              }
              const internal = internalPermissions.has(permission);
              core.info(`  ${login}: permission=${permission} internal=${internal}`);
              permissionCache.set(login, internal);
              return internal;
            }

            core.info(`author:`);
            if (await isInternal(pr.user.login)) {
              core.info(`internal PR; branch protection handles approval count`);
              return;
            }

            const required = 2;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number: pr.number, per_page: 100,
            });

            // Latest review per user on the current HEAD commit.
            const latestByUser = new Map();
            for (const r of reviews) {
              if (!r.user) continue;
              if (r.commit_id !== pr.head.sha) continue;
              if (!['APPROVED', 'CHANGES_REQUESTED', 'DISMISSED'].includes(r.state)) continue;
              latestByUser.set(r.user.login, r);
            }

            core.info(`reviewers:`);
            let approvals = 0;
            for (const [login, r] of latestByUser) {
              if (r.state !== 'APPROVED') continue;
              if (!(await isInternal(login))) continue;
              approvals++;
            }

            core.info(`external PR by ${pr.user.login}: required=${required} internal-approvals=${approvals}`);

            if (approvals < required) {
              core.setFailed(`external PRs require ${required} approvals from internal reviewers on HEAD commit, have ${approvals}`);
            }
