name: External PR Approvals

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed, edited]

permissions:
  pull-requests: read

jobs:
  check-approvals:
    name: "External PR Approvals"
    runs-on: ubuntu-latest
    steps:
      - name: Check required approvals
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            // Treat MEMBER, OWNER, COLLABORATOR as internal. Everyone else is external.
            const internalAssociations = new Set(['MEMBER', 'OWNER', 'COLLABORATOR']);
            const isExternal = !internalAssociations.has(pr.author_association);
            const required = isExternal ? 2 : 1;

            // Count approvals from internal reviewers only, and only the latest review per user.
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number: pr.number, per_page: 100,
            });

            const latestByUser = new Map();
            for (const r of reviews) {
              if (!r.user) continue;
              if (r.commit_id !== pr.head.sha) continue;
              if (!['APPROVED', 'CHANGES_REQUESTED', 'DISMISSED'].includes(r.state)) continue;
              latestByUser.set(r.user.login, r);
            }

            let approvals = 0;
            for (const r of latestByUser.values()) {
              if (r.state !== 'APPROVED') continue;
              if (!internalAssociations.has(r.author_association)) continue;
              approvals++;
            }

            core.info(`author_association=${pr.author_association} external=${isExternal} required=${required} approvals=${approvals}`);

            if (approvals < required) {
              core.setFailed(`needs ${required} internal approval(s) on HEAD commit, have ${approvals}`);
            }
