name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed, edited]
  merge_group:

permissions:
  pull-requests: read

jobs:
  check-pr-title:
    if: ${{ github.event_name != 'pull_request_review' }}
    name: "PR Title"
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Skip validation for merge_group events since PR title was already validated
          if [[ "${{ github.event_name }}" == "merge_group" ]]; then
            echo "Skipping PR title validation for merge_group event"
            exit 0
          fi

          # PR title must match: <type>: <title> or <type>(<project>): <title>
          # See CONTRIBUTING.md for details.

          VALID_TYPES="fix|feat|refactor|doc|test|chore|perf|revert"
          PATTERN="^(${VALID_TYPES})(\([a-z][a-z0-9-]*\))?: [a-z]"

          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title does not follow the required format."
            echo ""
            echo "Expected: <type>: <title> or <type>(<project>): <title>"
            echo "Got:      $PR_TITLE"
            echo ""
            echo "Rules:"
            echo "  - type must be one of: fix, feat, refactor, doc, test, chore, perf, revert"
            echo "  - project (if provided) must be lowercase (e.g. spice, resharding, state-sync)"
            echo "  - title must not be capitalized"
            echo ""
            echo "Examples:"
            echo "  test: add delayed receipt example"
            echo "  feat(spice): add catchup logic"
            echo "  fix(state-sync): properly validate header"
            echo ""
            echo "See CONTRIBUTING.md for full guidelines."
            exit 1
          fi

          echo "PR title is valid: $PR_TITLE"

  check-approvals:
    name: "External PR Approvals"
    if: ${{ github.event_name != 'merge_group' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check required approvals
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            // Treat MEMBER, OWNER, COLLABORATOR as internal. Everyone else is external.
            const internalAssociations = new Set(['MEMBER', 'OWNER', 'COLLABORATOR']);
            const isExternal = true; // TESTING: force external path
            void internalAssociations.has(pr.author_association);
            const required = isExternal ? 2 : 1;

            // Only count approvals that are on the current HEAD, from internal reviewers,
            // and reflect the reviewer's latest review state.
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number: pr.number, per_page: 100,
            });

            const latestByUser = new Map();
            for (const r of reviews) {
              if (!r.user) continue;
              if (r.commit_id !== pr.head.sha) continue;
              if (!['APPROVED', 'CHANGES_REQUESTED', 'DISMISSED'].includes(r.state)) continue;
              latestByUser.set(r.user.login, r);
            }

            let approvals = 0;
            for (const r of latestByUser.values()) {
              if (r.state !== 'APPROVED') continue;
              if (!internalAssociations.has(r.author_association)) continue;
              approvals++;
            }

            core.info(`author_association=${pr.author_association} external=${isExternal} required=${required} approvals=${approvals}`);

            if (approvals < required) {
              core.setFailed(`needs ${required} internal approval(s) on HEAD commit, have ${approvals}`);
            }
