name: Publish sandbox Docker image

# cspell:ignore dockerhub buildx

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Sandbox version to publish (e.g. 2.10.7). Must match an existing S3 binary."
        type: string
        required: true
      tag_latest:
        description: "Also tag as 'latest'"
        type: boolean
        default: false

jobs:
  publish:
    name: "Build and push sandbox Docker image"
    runs-on: ubuntu-latest
    environment: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify S3 binaries exist
        run: |
          for arch in Linux-x86_64 Linux-aarch64; do
            url="https://s3-us-west-1.amazonaws.com/build.nearprotocol.com/nearcore/${arch}/${{ inputs.version }}/near-sandbox.tar.gz"
            status=$(curl -o /dev/null -s -w "%{http_code}" --head "$url")
            if [ "$status" != "200" ]; then
              echo "ERROR: binary not found at $url (HTTP $status)"
              exit 1
            fi
            echo "OK: $url"
          done

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PAT_TOKEN }}

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare tags
        run: |
          TAGS="nearprotocol/sandbox:${{ inputs.version }}"
          if [ "${{ inputs.tag_latest }}" = "true" ]; then
            TAGS="${TAGS},nearprotocol/sandbox:latest"
          fi
          echo "DOCKER_TAGS=${TAGS}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/sandbox
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ inputs.version }}
          push: true
          tags: ${{ env.DOCKER_TAGS }}
