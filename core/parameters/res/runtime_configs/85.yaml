# yield_create_with_id charges this base instead of wasm_yield_create_base.
# Accounts for the two extra trie writes (YieldIdToDataId / DataIdToYieldId
# mapping) compared to plain yield_create. Value derived from wasm_yield_create_base
# (153B) plus the cost of two wasm_storage_write_base operations (~64B each).
