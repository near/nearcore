[advisories]
ignore = [
    # DO NOT ADD ANYTHING TO THIS LIST WITHOUT CAREFUL CONSIDERATION!

    # mach is unmaintained, but is required by near-vm-vm (via region).
    # It cannot be a security liability in production, considering it only provides bindings to the OS X kernel.
    "RUSTSEC-2020-0168",

    # older versions of parking-lot are vulnerable, but used by reed-solomon-erasure.
    "RUSTSEC-2020-0070",

    # proc-macro-error is unmaintained, but hard to replace right now (via dynasm).
    # Follow https://github.com/Kyuuhachi/syn_derive/issues/4
    "RUSTSEC-2024-0370",

    # The instant package is unmaintained, but hard to replace right now because
    # parking_lot 0.11 depends on it (via reed-solomon-erasure).
    "RUSTSEC-2024-0384",

    # The derivative package is unmaintained, but hard to replace right now
    # because ark-ec depends on it.
    "RUSTSEC-2024-0388",

    # burntsushi says the crate is feature complete and needs no maintenance, nagisa also doesn't
    # see any security risk whatsoever to keeping this crate, so we'll be letting it to upgrade out
    # of existence naturally.
    "RUSTSEC-2024-0436",

    # libsecp256k1 is unmaintained, but every version of aurora-engine-transactions pulls it in
    # (via aurora-engine-precompiles in 1.1, or aurora-engine-sdk in 1.2+). In the main workspace
    # it's only a dev-dependency (test-loop-tests, integration-tests). It is also a transitive
    # dependency of the wallet contract (separate workspace in runtime/near-wallet-contract/implementation/).
    "RUSTSEC-2025-0161",

    # RUSTSEC-2026-0097: rand unsoundness only triggers when rand's `log` feature is on and a
    # custom `log::Log` logger calls `rand::rng()` on reseed. Neither applies here: the `log`
    # feature is not enabled (check with `cargo tree -e features --workspace | grep 'rand feature'`)
    # and nearcore has no custom `log::Log` impl (logging goes through tracing).
    # Fixed in rand >= 0.9.3 / >= 0.10.1; 0.8.x has no patch and 0.7.3/0.9.0 are transitive.
    "RUSTSEC-2026-0097",

    # RUSTSEC-2026-0186: memmap2 unsoundness is confined to advise_range/flush_range/
    # flush_async_range/unchecked_advise_range. dynasmrt 2.0 (its only consumer here, via
    # the near-vm singlepass JIT; the wasmtime path does not use dynasmrt) calls none of
    # these, only map_anon/make_exec/make_mut. The fix is in memmap2 >= 0.9.11, unreachable
    # without upgrading dynasmrt 2.0 -> 3.0, a 260-callsite migration of the x86-64 emitter.
    # TODO: remove this entry when near-vm is deprecated in favor of the wasmtime path.
    "RUSTSEC-2026-0186",
]
