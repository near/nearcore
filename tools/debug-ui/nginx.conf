server {
  listen 80;
  server_name _;

  root /var/www/html;
  index index.html;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # --- Dynamic DNS resolver required for variables in proxy_pass
  resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
  resolver_timeout 5s;

  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 15s;
  proxy_connect_timeout 5s;
  proxy_send_timeout 15s;

  # ========= GENERIC PROXY =========
  # Anything under /proxy/* is forwarded to http://<addr>/*
  location ^~ /proxy/ {
    if ($arg_addr = "") { return 400 "missing addr"; }
    if ($addr_ok = 0)  { return 403 "addr not allowed"; }

    # Capture the rest of the path after /proxy/
    set $target_path $uri;
    # Remove the "/proxy" prefix
    if ($target_path ~ ^/proxy(/.*)) {
      set $target_path $1;
    }

    proxy_set_header Host $arg_addr;
    proxy_pass http://$arg_addr$target_path$is_args$args;
  }

    location /static {
        alias /var/www/html/static;
    }

  # ========= Static app (SPA) =========
  location / {
    try_files $uri /index.html;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
